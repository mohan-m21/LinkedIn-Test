<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkedIn Login</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f3f2ef;
    margin:0;
}

/* Navbar */

.navbar{
    background:white;
    padding:15px 60px;
    font-size:30px;
    font-weight:bold;
    color:#0a66c2;
}

/* Login Card */

.container{
    display:flex;
    justify-content:center;
    margin-top:70px;
}

.card{
    background:white;
    width:350px;
    padding:30px;
    border-radius:8px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

.card h2{
    margin-bottom:10px;
}

.card p{
    color:gray;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:4px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#0a66c2;
    color:white;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#004182;
}

.link{
    margin-top:15px;
    color:#0a66c2;
    font-size:14px;
    cursor:pointer;
}

.signup{
    text-align:center;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="navbar">
LinkedIn
</div>

<div class="container">

<div class="card">

<h2>Sign in</h2>
<p>Stay updated on your professional world</p>

<form action="/login" method="POST">

<input type="email" name="email" placeholder="Email or Phone" required>

<input type="password" name="password" placeholder="Password" required>

<div class="link">Forgot password?</div>

<button type="submit">Sign in</button>

</form>

<div class="signup">
New to LinkedIn? <a href="register.html">Join now</a>
</div>

</div>

</div>

</body>
</html>
