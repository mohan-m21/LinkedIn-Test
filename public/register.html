<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card p-4">

<h3 class="text-center">Register</h3>

<form action="/auth/register" method="POST">

<input class="form-control mt-3" name="name" placeholder="Name">

<input class="form-control mt-3" name="email" placeholder="Email">

<input class="form-control mt-3" name="password" placeholder="Password">

<button class="btn btn-success w-100 mt-3">Register</button>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
